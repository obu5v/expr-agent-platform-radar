  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ========== 全局基础样式 ========== */
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: rgba(17, 24, 39, 0.7);
      --border-card: rgba(0, 212, 255, 0.15);
      --accent-cyan: #00d4ff;
      --accent-cyan-dim: rgba(0, 212, 255, 0.3);
      --accent-orange: #ff6b35;
      --accent-orange-dim: rgba(255, 107, 53, 0.3);
      --accent-green: #00ff88;
      --accent-purple: #a855f7;
      --accent-yellow: #fbbf24;
      --text-primary: #e5e7eb;
      --text-secondary: #9ca3af;
      --text-dim: #6b7280;
      --glass-bg: rgba(17, 24, 39, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 背景网格效果 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(255, 107, 53, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .dashboard-container {
      position: relative;
      z-index: 1;
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ========== 玻璃拟态卡片 ========== */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .glass-card:hover {
      border-color: var(--border-card);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.05);
    }

    /* ========== 标题样式 ========== */
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 16px;
      background: var(--accent-cyan);
      border-radius: 2px;
    }

    /* ========== KPI 卡片 ========== */
    .kpi-card {
      padding: 20px 24px;
      text-align: center;
    }
    .kpi-value {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }
    .kpi-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ========== 表格样式 ========== */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.85rem;
    }
    .data-table thead th {
      background: rgba(0, 212, 255, 0.08);
      color: var(--accent-cyan);
      font-weight: 600;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid var(--border-card);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .data-table tbody tr {
      cursor: pointer;
      transition: background 0.2s;
    }
    .data-table tbody tr:hover {
      background: rgba(0, 212, 255, 0.05);
    }
    .data-table tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-primary);
      vertical-align: middle;
    }
    .data-table .detail-row td {
      padding: 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .detail-content {
      padding: 16px 20px;
      background: rgba(0, 212, 255, 0.03);
      border-left: 3px solid var(--accent-cyan);
      display: none;
    }
    .detail-content.open { display: block; }

    /* ========== 标签/徽章 ========== */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .badge-ecosystem { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }
    .badge-professional { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .badge-emerging { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .badge-native { background: rgba(0, 255, 136, 0.15); color: #00ff88; }
    .badge-partial { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .badge-none { background: rgba(107, 114, 128, 0.15); color: #9ca3af; }
    .badge-planned { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .badge-supported { background: rgba(0, 255, 136, 0.15); color: #00ff88; }
    .badge-limited { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .badge-international { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }
    .badge-domestic { background: rgba(255, 107, 53, 0.15); color: #ff6b35; }
    .badge-deploy { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

    /* ========== 时间线 ========== */
    .timeline-item {
      position: relative;
      padding-left: 24px;
      padding-bottom: 16px;
      border-left: 2px solid rgba(0, 212, 255, 0.2);
      transition: border-color 0.2s;
    }
    .timeline-item:hover { border-left-color: var(--accent-cyan); }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-cyan);
      box-shadow: 0 0 6px var(--accent-cyan-dim);
    }
    .timeline-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .timeline-platform {
      font-size: 0.72rem;
      color: var(--accent-cyan);
      font-weight: 600;
    }
    .timeline-title {
      font-size: 0.85rem;
      color: var(--text-primary);
      margin: 2px 0;
      cursor: pointer;
      transition: color 0.2s;
    }
    .timeline-title:hover { color: var(--accent-cyan); }
    .timeline-summary {
      font-size: 0.78rem;
      color: var(--text-secondary);
      display: none;
      margin-top: 4px;
      line-height: 1.5;
    }
    .timeline-summary.open { display: block; }
    .timeline-source {
      font-size: 0.7rem;
    }
    .timeline-source a {
      color: var(--accent-cyan);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .timeline-source a:hover { opacity: 1; text-decoration: underline; }

    /* ========== 筛选按钮 ========== */
    .filter-btn {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      border-color: var(--accent-cyan-dim);
      color: var(--accent-cyan);
    }
    .filter-btn.active {
      background: rgba(0, 212, 255, 0.12);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    /* ========== 图表容器 ========== */
    .chart-container {
      position: relative;
      width: 100%;
    }

    /* ========== 气泡图工具提示 ========== */
    #landscapeTooltip {
      position: absolute;
      display: none;
      background: rgba(10, 14, 23, 0.95);
      border: 1px solid var(--accent-cyan-dim);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      pointer-events: none;
      z-index: 100;
      max-width: 280px;
      backdrop-filter: blur(8px);
    }
    #landscapeTooltip .tip-name {
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 4px;
    }
    #landscapeTooltip .tip-row {
      color: var(--text-secondary);
      margin: 2px 0;
    }

    /* ========== 滚动条美化 ========== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 212, 255, 0.4); }

    /* ========== 顶部标题栏 ========== */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
    }
    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-subtitle {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--accent-green);
    }
    .header-status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--accent-green); }
      50% { opacity: 0.5; box-shadow: 0 0 8px var(--accent-green); }
    }

    /* ========== 响应式 ========== */
    @media (max-width: 1024px) {
      .kpi-value { font-size: 2rem; }
      .dashboard-container { padding: 16px; }
    }
  </style>
</head>

      <div class="chart-container" style="height: 420px;">
        <canvas id="radarChart"></canvas>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
    <!-- 4. 部署模式分布 -->
    <div class="glass-card p-5">
      <div class="section-title">部署模式分布</div>
      <div class="chart-container" style="height: 300px;">
        <canvas id="deployChart"></canvas>
      </div>
    </div>

    <!-- 7. 协议采纳趋势 -->
    <div class="glass-card p-5 lg:col-span-2">
      <div class="section-title">协议采纳状态</div>
      <div class="chart-container" style="height: 300px;">
        <canvas id="protocolChart"></canvas>
      </div>
    </div>
  </div>

  <!-- ========== 5. 梯队对比表 ========== -->
  <div class="glass-card p-5 mb-6">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
      <div class="section-title" style="margin-bottom:0;">梯队对比表</div>
      <div class="flex flex-wrap gap-2" id="tableFilters">
        <button class="filter-btn active" data-filter="all" onclick="filterTable('all', this)">全部</button>
        <button class="filter-btn" data-filter="ecosystem" onclick="filterTable('ecosystem', this)">生态级</button>
        <button class="filter-btn" data-filter="professional" onclick="filterTable('professional', this)">专业级</button>
        <button class="filter-btn" data-filter="emerging" onclick="filterTable('emerging', this)">新兴</button>
        <span style="color:var(--text-dim);font-size:0.75rem;line-height:2;">|</span>
        <button class="filter-btn" data-filter="international" onclick="filterTable('international', this)">国际</button>
        <button class="filter-btn" data-filter="domestic" onclick="filterTable('domestic', this)">国内</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="comparisonTable">
        <thead>
          <tr>
            <th>平台名称</th>
            <th>厂商</th>
            <th>梯队</th>
            <th>区域</th>

            <th>MCP</th>

          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ========== 6. 最新动态时间线 ========== -->

    <div class="section-title">最新动态时间线</div>
    <div id="timelineContainer" style="max-height: 520px; overflow-y: auto; padding-right: 8px;"></div>
  </div>

  <!-- ========== 底部 ========== -->
  <div style="text-align:center; padding: 20px 0 8px; color: var(--text-dim); font-size: 0.72rem;">
    智能体平台态势感知 Dashboard · 数据更新于 <span id="footerDate"></span> · 仅供内部参考
  </div>
</div>

// ============================================================
// 工具函数
// ============================================================

/** 部署模式开放度评分：开源=4, 混合=3, SaaS=2, self-hosted=2 */
function deploymentOpenness(deployment) {
  if (!deployment || !deployment.length) return 1;
  const scores = deployment.map(d => {
    switch(d) {
      case 'open-source': return 4;
      case 'hybrid': return 3;
      case 'saas': return 2;
      case 'self-hosted': return 2;
      default: return 1;
    }
  });
  return Math.max(...scores);
}

/** 生态绑定程度（用于气泡大小） */
function ecosystemScore(platform) {
  const bindings = platform.ecosystem_binding ? platform.ecosystem_binding.length : 0;
  const caps = platform.core_capabilities ? platform.core_capabilities.length : 0;
  return bindings + caps * 0.5;
}

/** 梯队中文名 */
function tierLabel(t) {
  switch(t) {
    case 'ecosystem': return '生态级';
    case 'professional': return '专业级';
    case 'emerging': return '新兴';
    default: return t;
  }
}

/** 能力状态徽章 */
function statusBadge(val, type) {
  const map = {
    'native': 'badge-native',
    'partial': 'badge-partial',
    'none': 'badge-none',
    'planned': 'badge-planned',
    'supported': 'badge-supported',
    'limited': 'badge-limited',
    'ecosystem': 'badge-ecosystem',
    'professional': 'badge-professional',
    'emerging': 'badge-emerging',
    'international': 'badge-international',
    'domestic': 'badge-domestic',
  };
  const label = type === 'tier' ? tierLabel(val) :
                type === 'region' ? (val === 'international' ? '国际' : '国内') : val;
  return `<span class="badge ${map[val] || 'badge-none'}">${label}</span>`;
}

/** 部署模式标签 */
function deployBadges(deploy) {
  return deploy.map(d => `<span class="badge badge-deploy">${d}</span>`).join(' ');
}

function renderKPIs() {
  const total = PLATFORMS.length;
  const intl = PLATFORMS.filter(p => p.region === 'international').length;
  const dom = PLATFORMS.filter(p => p.region === 'domestic').length;
  const mcp = PLATFORMS.filter(p => p.mcp_support === 'native').length;

  // 动画计数器
  function animate(el, target) {
    let current = 0;
    const step = Math.ceil(target / 30);
    const timer = setInterval(() => {
      current += step;
      if (current >= target) { current = target; clearInterval(timer); }
      el.textContent = current;
    }, 30);
  }

  animate(document.getElementById('kpiTotal'), total);
  animate(document.getElementById('kpiInternational'), intl);
  animate(document.getElementById('kpiDomestic'), dom);
  animate(document.getElementById('kpiMCP'), mcp);
}

      responsive: true,

      scales: {
        x: {
          title: {
            display: true,

      plugins: {
        legend: {
          position: 'top',
          labels: {
            color: '#9ca3af',
            font: { size: 11 },
            usePointStyle: true,
            pointStyle: 'circle',

        tooltip: {
          enabled: false,
          external: function(context) {
            const point = context.tooltip?.dataPoints?.[0];
            if (!point) {
              tooltip.style.display = 'none';
              return;
            }
            const d = point.raw;
            const rect = container.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();
            const posX = context.tooltip.caretX;
            const posY = context.tooltip.caretY;

            tooltip.querySelector('.tip-name').textContent = d.name;

  PLATFORMS.forEach(p => {
    p.deployment.forEach(d => {
      deployCounts[d] = (deployCounts[d] || 0) + 1;
    });
  });

  const deployLabels = {
    'saas': 'SaaS',
    'open-source': '开源',
    'hybrid': '混合部署',
    'self-hosted': '私有化部署'
  };

  const keys = Object.keys(deployCounts).sort((a,b) => deployCounts[b] - deployCounts[a]);
  const labels = keys.map(k => deployLabels[k] || k);
  const values = keys.map(k => deployCounts[k]);
  const colors = ['#00d4ff', '#a855f7', '#00ff88', '#fbbf24', '#ff6b35'];

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: colors.slice(0, keys.length).map(c => c + '80'),
        borderColor: colors.slice(0, keys.length),
        borderWidth: 2,
        hoverBorderWidth: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#9ca3af',
            font: { size: 11 },
            padding: 12,
            usePointStyle: true
          }
        },
        tooltip: {
          backgroundColor: 'rgba(10,14,23,0.95)',
          borderColor: 'rgba(0,212,255,0.3)',
          borderWidth: 1,
          titleColor: '#00d4ff',
          bodyColor: '#e5e7eb',
          callbacks: {
            label: function(context) {
              return `${context.label}：${context.raw} 个平台`;
            }
          }
        }
      }
    }
  });
}

// ============================================================
// 5. 梯队对比表
// ============================================================
let currentFilter = 'all';

function renderTable(filter) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  let filtered = PLATFORMS;
  if (filter === 'ecosystem' || filter === 'professional' || filter === 'emerging') {
    filtered = PLATFORMS.filter(p => p.tier === filter);
  } else if (filter === 'international' || filter === 'domestic') {
    filtered = PLATFORMS.filter(p => p.region === filter);
  }

  filtered.forEach(p => {
    // 主行
    const tr = document.createElement('tr');
    tr.className = 'main-row';
    tr.onclick = () => toggleDetail(p.id);
    tr.innerHTML = `
      <td style="font-weight:600; white-space:nowrap;">${p.name}</td>
      <td style="white-space:nowrap;">${p.vendor}</td>
      <td>${statusBadge(p.tier, 'tier')}</td>
      <td>${statusBadge(p.region, 'region')}</td>
      <td>${deployBadges(p.deployment)}</td>
      <td>${statusBadge(p.multi_agent)}</td>
      <td>${statusBadge(p.mcp_support)}</td>
      <td>${statusBadge(p.visual_builder)}</td>
      <td>${statusBadge(p.private_deploy)}</td>
      <td style="font-size:0.75rem;color:var(--text-secondary);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.pricing_model}">${p.pricing_model}</td>
    `;
    tbody.appendChild(tr);

    // 详情行
    const detailTr = document.createElement('tr');
    detailTr.className = 'detail-row';
    detailTr.id = `detail-${p.id}`;
    detailTr.innerHTML = `
      <td colspan="10">
        <div class="detail-content" id="detail-content-${p.id}">
          <div style="margin-bottom:10px;">
            <span style="color:var(--accent-cyan);font-weight:600;">定位：</span>
            <span style="color:var(--text-secondary);">${p.positioning}</span>
          </div>
          <div style="margin-bottom:10px;">
            <span style="color:var(--accent-cyan);font-weight:600;">核心能力：</span>
            <span style="color:var(--text-secondary);">${p.core_capabilities.join(', ')}</span>
          </div>
          <div style="margin-bottom:10px;">
            <span style="color:var(--accent-cyan);font-weight:600;">模型支持：</span>
            <span style="color:var(--text-secondary);">${p.model_support.join(', ')}</span>
          </div>
          ${p.notes ? `<div style="margin-bottom:10px;">
            <span style="color:var(--accent-cyan);font-weight:600;">备注：</span>
            <span style="color:var(--text-secondary);">${p.notes}</span>
          </div>` : ''}
          ${p.recent_news && p.recent_news.length ? `
          <div>
            <span style="color:var(--accent-cyan);font-weight:600;">近期动态：</span>
            <ul style="margin-top:6px;padding-left:18px;color:var(--text-secondary);font-size:0.8rem;line-height:1.8;">
              ${p.recent_news.map(n => `<li><span style="color:var(--text-dim);">${n.date}</span> ${n.title}</li>`).join('')}
            </ul>
          </div>` : ''}
        </div>
      </td>
    `;
    tbody.appendChild(detailTr);
  });
}

function toggleDetail(id) {
  const el = document.getElementById(`detail-content-${id}`);
  if (el) el.classList.toggle('open');
}

function filterTable(filter, btn) {
  currentFilter = filter;
  // 更新按钮状态
  document.querySelectorAll('#tableFilters .filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTable(filter);
}

// ============================================================
// 6. 最新动态时间线
// ============================================================
function renderTimeline() {
  const container = document.getElementById('timelineContainer');

  // 汇总所有新闻，附加平台信息
  let allNews = [];
  PLATFORMS.forEach(p => {
    if (p.recent_news) {
      p.recent_news.forEach(n => {
        allNews.push({
          ...n,
          platformName: p.name,
          platformId: p.id,
          region: p.region
        });
      });
    }
  });

  // 按日期倒序
  allNews.sort((a, b) => b.date.localeCompare(a.date));

  // 取最近30条
  const recent = allNews.slice(0, 30);

  container.innerHTML = recent.map((n, i) => `
    <div class="timeline-item">
      <div class="timeline-date">${n.date}</div>
      <div class="timeline-platform">
        ${n.region === 'domestic' ? '🔴' : '🔵'} ${n.platformName}
      </div>
      <div class="timeline-title" onclick="toggleTimelineSummary(${i})">${n.title}</div>
      <div class="timeline-summary" id="tl-summary-${i}">${n.summary}</div>
      ${n.source_url ? `<div class="timeline-source"><a href="${n.source_url}" target="_blank" rel="noopener">查看来源 ↗</a></div>` : ''}
    </div>
  `).join('');
}

function toggleTimelineSummary(idx) {
  const el = document.getElementById(`tl-summary-${idx}`);
  if (el) el.classList.toggle('open');
}

// ============================================================
// 7. 协议采纳状态（横向条形图）
// ============================================================
function renderProtocolChart() {
  const ctx = document.getElementById('protocolChart').getContext('2d');

  // MCP 支持状态
  const mcpStatus = { native: 0, partial: 0, none: 0, planned: 0 };
  PLATFORMS.forEach(p => { mcpStatus[p.mcp_support] = (mcpStatus[p.mcp_support] || 0) + 1; });

  // A2A 支持状态（从 core_capabilities 中判断）
  const a2aStatus = { native: 0, partial: 0, none: 0, planned: 0 };
  PLATFORMS.forEach(p => {
    if (p.core_capabilities && p.core_capabilities.includes('a2a')) {
      a2aStatus.native++;
    } else {
      a2aStatus.none++;
    }
  });

  const platformNames = PLATFORMS.map(p => p.name.length > 20 ? p.name.substring(0,18) + '…' : p.name);

  // 每个平台的MCP状态数值映射：native=3, partial=2, planned=1, none=0
  const mcpValues = PLATFORMS.map(p => {
    switch(p.mcp_support) {
      case 'native': return 3;
      case 'partial': return 2;
      case 'planned': return 1;
      default: return 0;
    }
  });

  const a2aValues = PLATFORMS.map(p => {
    if (p.core_capabilities && p.core_capabilities.includes('a2a')) return 3;
    return 0;
  });

  // 按 MCP 值排序
  const indices = PLATFORMS.map((_, i) => i);
  indices.sort((a, b) => mcpValues[b] - mcpValues[a]);

  const sortedNames = indices.map(i => platformNames[i]);
  const sortedMcp = indices.map(i => mcpValues[i]);
  const sortedA2a = indices.map(i => a2aValues[i]);

  const statusColors = {
    3: 'rgba(0, 255, 136, 0.7)',   // native - green
    2: 'rgba(251, 191, 36, 0.7)',   // partial - yellow
    1: 'rgba(168, 85, 247, 0.7)',   // planned - purple
    0: 'rgba(75, 85, 99, 0.4)'      // none - gray
  };

  // 为每个条形生成颜色数组
  const mcpColors = sortedMcp.map(v => statusColors[v]);
  const a2aColors = sortedA2a.map(v => statusColors[v]);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sortedNames,
      datasets: [
        {
          label: 'MCP',
          data: sortedMcp,
          backgroundColor: mcpColors,
          borderColor: mcpColors.map(c => c.replace('0.7', '1').replace('0.4', '0.6')),
          borderWidth: 1,
          barPercentage: 0.7,
          categoryPercentage: 0.8
        },
        {
          label: 'A2A',
          data: sortedA2a,
          backgroundColor: a2aColors,
          borderColor: a2aColors.map(c => c.replace('0.7', '1').replace('0.4', '0.6')),
          borderWidth: 1,
          barPercentage: 0.7,
          categoryPercentage: 0.8
        }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          min: 0,
          max: 3.5,
          ticks: {
            stepSize: 1,
            color: '#6b7280',
            font: { size: 10 },
            callback: v => ['无', '规划中', '部分支持', '原生支持', ''][v] || ''
          },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        y: {
          ticks: {
            color: '#9ca3af',
            font: { size: 10 }
          },
          grid: { display: false }
        }
      },
      plugins: {
        legend: {
          position: 'top',
          labels: {
            color: '#9ca3af',
            font: { size: 11 },
            usePointStyle: true,
            padding: 16
          }
        },
        tooltip: {
          backgroundColor: 'rgba(10,14,23,0.95)',
          borderColor: 'rgba(0,212,255,0.3)',
          borderWidth: 1,
          titleColor: '#00d4ff',
          bodyColor: '#e5e7eb',
          callbacks: {
            label: function(context) {
              const val = context.raw;
              const label = ['不支持', '规划中', '部分支持', '原生支持'][val] || '未知';
              return `${context.dataset.label}：${label}`;
            }
          }
        }
      }
    }
  });
}

// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  // 更新底部日期
  const now = new Date();
  const dateStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0');
  document.getElementById('footerDate').textContent = dateStr;

  // 找最近更新日期
  let latestDate = '2026-01-01';
  PLATFORMS.forEach(p => {
    if (p.last_updated && p.last_updated > latestDate) latestDate = p.last_updated;
  });
  document.getElementById('lastUpdateTime').textContent = `数据截至 ${latestDate}`;

  // 渲染各模块
  renderKPIs();
  renderLandscapeChart();
  renderRadarChart();
  renderDeployChart();
  renderTable('all');
  renderTimeline();
  renderProtocolChart();
});
</script>
